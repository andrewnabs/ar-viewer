<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>AR Air Situation</title>
  <style>
    :root {
      --bg: #06121f; --accent: #35c7e0; --text: #dfe8f0; --dim: #8899a6;
      --green: #35d07f; --amber: #f0b035;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text); overscroll-behavior: none; }
    /* MindAR injects its <video> and a container; make sure it fills the screen */
    #ar { position: fixed; inset: 0; }
    #ar canvas, #ar video { position: absolute !important; inset: 0; width: 100% !important; height: 100% !important; object-fit: cover; }

    .overlay { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 28px;
      background: radial-gradient(120% 120% at 50% 0%, rgba(6,18,31,.72), rgba(3,10,18,.92));
      backdrop-filter: blur(2px); transition: opacity .4s ease; }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .logo { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
    .overlay h1 { font-size: 22px; font-weight: 600; margin: 0 0 10px; }
    .overlay p { max-width: 320px; color: var(--dim); line-height: 1.5; margin: 0 0 22px; font-size: 15px; }
    .reticle { width: 148px; height: 148px; border: 2px solid var(--accent); border-radius: 14px;
      position: relative; margin-bottom: 26px; opacity: .8; }
    .reticle::before, .reticle::after { content: ''; position: absolute; background: var(--accent);
      left: 8px; right: 8px; height: 2px; top: 50%; box-shadow: 0 0 12px var(--accent); animation: scan 2.4s ease-in-out infinite; }
    .reticle::after { display: none; }
    @keyframes scan { 0%,100% { transform: translateY(-58px); } 50% { transform: translateY(58px); } }
    .btn { appearance: none; border: 1px solid var(--accent); background: rgba(53,199,224,.12);
      color: var(--text); font-size: 15px; padding: 13px 22px; border-radius: 999px; font-weight: 600; }
    .btn.ghost { border-color: rgba(136,153,166,.5); background: transparent; color: var(--dim); margin-top: 12px; font-weight: 500; font-size: 13px; }
    .err { color: var(--amber); font-size: 14px; max-width: 320px; }

    /* HUD shown while the scene is live */
    .hud { position: fixed; z-index: 15; pointer-events: none; }
    .hud-top { top: 0; left: 0; right: 0; padding: 14px 16px calc(14px + env(safe-area-inset-top));
      display: flex; justify-content: space-between; align-items: flex-start;
      background: linear-gradient(rgba(3,10,18,.66), transparent); }
    .hud-title { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    .hud-title small { display: block; color: var(--dim); letter-spacing: 1px; font-size: 11px; margin-top: 3px; }
    .status-pill { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 10px;
      border-radius: 999px; border: 1px solid; white-space: nowrap; }
    .status-pill.searching { color: var(--amber); border-color: var(--amber); }
    .status-pill.tracking { color: var(--green); border-color: var(--green); }
    .hud-bottom { bottom: 0; left: 0; right: 0; padding: 14px 16px calc(16px + env(safe-area-inset-bottom));
      text-align: center; color: var(--dim); font-size: 12px; letter-spacing: 1px;
      background: linear-gradient(transparent, rgba(3,10,18,.66)); }
    .controls { position: fixed; right: 14px; bottom: calc(58px + env(safe-area-inset-bottom)); z-index: 16;
      display: flex; flex-direction: column; gap: 10px; }
    .controls button { pointer-events: auto; width: 46px; height: 46px; border-radius: 12px;
      border: 1px solid rgba(53,199,224,.5); background: rgba(6,18,31,.6); color: var(--text); font-size: 20px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="ar"></div>

  <div class="hud hud-top hidden" id="hud">
    <div class="hud-title" id="hudTitle">AIR SITUATION<small id="hudSub">scenario</small></div>
    <div class="status-pill searching" id="statusPill">◎ Searching…</div>
  </div>
  <div class="controls hidden" id="controls">
    <button id="btnIn"  aria-label="Zoom in">＋</button>
    <button id="btnOut" aria-label="Zoom out">－</button>
    <button id="btnSpin" aria-label="Toggle rotation">⟲</button>
  </div>
  <div class="hud hud-bottom hidden" id="hudBottom">Drag to rotate · pinch to resize</div>

  <div class="overlay" id="intro">
    <div class="logo">Thales · AR Air Picture</div>
    <h1 id="introTitle">Air Situation in 3D</h1>
    <p id="introText">Allow camera access, then point your phone at the radar screen. The air picture will rise into 3D in front of it.</p>
    <div class="reticle"></div>
    <button class="btn" id="startBtn">Start AR</button>
    <button class="btn ghost hidden" id="freeBtn">Can’t see the screen? Place it in front of me</button>
    <div class="err hidden" id="errBox"></div>
  </div>

  <!-- Libraries are vendored (committed under vendor/) so the viewer is fully
       self-contained on GitHub Pages — no CDN dependency or version drift. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "three/addons/": "./vendor/three-addons/",
      "mindar-image-three": "./vendor/mindar-image-three.prod.js"
    }
  }
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
